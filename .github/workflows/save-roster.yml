name: Save Roster

on:
  workflow_dispatch:
    inputs:
      roster_name:
        description: "Name of the roster"
        required: true
      roster_json:
        description: "Roster JSON data"
        required: true

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create .rosters folder
        run: mkdir -p .rosters

      - name: Save roster file
        run: |
          echo '${{ inputs.roster_json }}' > ".rosters/${{ inputs.roster_name }}.json"

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .rosters
          git commit -m "Save roster: ${{ inputs.roster_name }}" || echo "No changes"
          git push

