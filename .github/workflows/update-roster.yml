name: Update Roster

on:
  workflow_dispatch:
    inputs:
      roster:
        description: "Roster JSON"
        required: true

jobs:
  update-roster:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update players.json
        run: |
          echo '${{ github.event.inputs.roster }}' > players.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add players.json
          git commit -m "Update roster" || echo "No changes to commit"
          git push
