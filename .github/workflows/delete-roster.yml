name: Delete Roster

on:
  workflow_dispatch:
    inputs:
      roster_name:
        description: "Name of the roster to delete"
        required: true

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Delete roster file
        run: |
          FILE=".rosters/${{ inputs.roster_name }}.json"
          if [ -f "$FILE" ]; then
            rm "$FILE"
          fi

      - name: Commit deletion
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .rosters
          git commit -m "Delete roster: ${{ inputs.roster_name }}" || echo "No changes"
          git push

